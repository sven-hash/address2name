name: Validate know-walletsv2.json

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths: ['know-walletsv2.json']
  pull_request:
    branches: [main, master, develop]
    paths: ['know-walletsv2.json']

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          if [ ! -f "know-walletsv2.json" ]; then
            echo "❌ File know-walletsv2.json not found"
            exit 1
          fi

          set +e
          ERROR=$(jq empty know-walletsv2.json 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Invalid JSON syntax"
            echo "$ERROR"
            LINE=$(echo "$ERROR" | grep -oP 'line \K\d+' || echo "")
            if [ -n "$LINE" ]; then
              echo "📍 Context around line $LINE:"
              sed -n "$((LINE-2)),$((LINE+2))p" know-walletsv2.json | nl -ba -v $((LINE-2))
            fi
            exit 1
          fi
          echo "✅ Valid JSON syntax"

      - name: Validate JSON structure
        run: |
          if ! jq -e 'type == "object"' know-walletsv2.json > /dev/null 2>&1; then
            echo "❌ Root must be an object"
            exit 1
          fi
          COUNT=$(jq 'length' know-walletsv2.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ File cannot be empty"
            exit 1
          fi
          echo "✅ Structure valid ($COUNT entries)"

      - name: Validate required fields
        run: |
          RESULT=$(jq -r '
            to_entries |
            map(
              select(
                (.value | has("type") and has("name") and has("state") and has("exchangename")) | not
              ) |
              {
                key: .key,
                missing: [
                  (if (.value | has("type"))         then empty else "type"         end),
                  (if (.value | has("name"))         then empty else "name"         end),
                  (if (.value | has("state"))        then empty else "state"        end),
                  (if (.value | has("exchangename")) then empty else "exchangename" end)
                ]
              }
            ) |
            if length > 0 then
              map("❌ Key: \(.key) — Missing: \(.missing | join(", "))") | join("\n")
            else empty end
          ' know-walletsv2.json)

          if [ -n "$RESULT" ]; then
            echo "❌ Missing required fields:"
            echo "$RESULT"
            exit 1
          fi
          echo "✅ All required fields present"

      - name: Validate state values
        run: |
          INVALID=$(jq -r '
            to_entries |
            map(
              (.value.state | split("#")[0]) as $base |
              select(
                $base != "verified" and $base != "guessed" and
                $base != "identified" and $base != "pending" and
                $base != "rejected" and $base != ""
              ) |
              "❌ Key: \(.key) — Invalid state: \"\(.value.state)\""
            ) |
            if length > 0 then join("\n") else empty end
          ' know-walletsv2.json)

          if [ -n "$INVALID" ]; then
            echo "❌ Invalid state values:"
            echo "$INVALID"
            echo "Valid: verified, guessed, identified, pending, rejected, or empty"
            exit 1
          fi
          echo "✅ All state values valid"

      - name: Validate field types
        run: |
          ERRORS=$(jq -r '
            to_entries |
            map({
              key: .key,
              errors: [
                (if (.value.type         | type != "string") then "type must be string"         else empty end),
                (if (.value.name         | type != "string") then "name must be string"         else empty end),
                (if (.value.state        | type != "string") then "state must be string"        else empty end),
                (if (.value.exchangename | type != "string") then "exchangename must be string" else empty end)
              ]
            }) |
            map(select(.errors | length > 0)) |
            map("❌ Key: \(.key) — \(.errors | join(", "))") |
            if length > 0 then join("\n") else empty end
          ' know-walletsv2.json)

          if [ -n "$ERRORS" ]; then
            echo "❌ Field type errors:"
            echo "$ERRORS"
            exit 1
          fi
          echo "✅ All field types valid"

      - name: Check for duplicate keys
        run: |
          DUPES=$(jq -r 'keys[]' know-walletsv2.json | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "❌ Duplicate keys found:"
            echo "$DUPES"
            exit 1
          fi
          echo "✅ No duplicate keys"

      - name: Generate summary
        if: always()
        run: |
          if [ ! -f "know-walletsv2.json" ] || ! jq empty know-walletsv2.json 2>/dev/null; then
            echo "status=failure" > validation-result.txt
            echo "summary=File missing or invalid JSON" >> validation-result.txt
          else
            TOTAL=$(jq 'length' know-walletsv2.json)
            VERIFIED=$(jq   '[.[] | select(.state | startswith("verified"))]   | length' know-walletsv2.json)
            GUESSED=$(jq    '[.[] | select(.state | startswith("guessed"))]    | length' know-walletsv2.json)
            IDENTIFIED=$(jq '[.[] | select(.state | startswith("identified"))] | length' know-walletsv2.json)
            PENDING=$(jq    '[.[] | select(.state | startswith("pending"))]    | length' know-walletsv2.json)
            REJECTED=$(jq   '[.[] | select(.state | startswith("rejected"))]  | length' know-walletsv2.json)
            EMPTY=$(jq      '[.[] | select(.state == "")]                      | length' know-walletsv2.json)

            {
              echo "total=$TOTAL"
              echo "verified=$VERIFIED"
              echo "guessed=$GUESSED"
              echo "identified=$IDENTIFIED"
              echo "pending=$PENDING"
              echo "rejected=$REJECTED"
              echo "empty_state=$EMPTY"
            } > validation-result.txt
          fi

          # Save PR number for the commenter workflow
          echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            validation-result.txt
            pr-number.txt
          retention-days: 1
